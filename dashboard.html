<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseIQ Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Excel Export Library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="dashboard-page">

    <div class="dashboard-container">

        <!-- HEADER -->
        <header class="dashboard-header">

            <div>
                <h1 class="project-title">
                    ExpenseIQ
                </h1>

                <p class="project-tagline">
                    Track smarter. Spend better
                </p>
            </div>

            <div class="header-buttons">

                <button
                    id="exportBtn"
                    class="export-btn"
                >
                    Export Excel
                </button>

                <button
                    id="logoutBtn"
                    class="logout-btn"
                >
                    Logout
                </button>

            </div>

        </header>

        <!-- EXPENSE PANEL -->
        <section class="panel expense-panel">

            <h2>Add Expense</h2>

            <div class="expense-form">

                <select id="category">

                    <option value="">
                        Select Expense Type
                    </option>

                    <option value="Food">
                        Food
                    </option>

                    <option value="Travel">
                        Travel
                    </option>

                    <option value="Groceries">
                        Groceries
                    </option>

                    <option value="Shopping">
                        Shopping
                    </option>

                    <option value="Bills">
                        Bills
                    </option>

                    <option value="Financial">
                        Financial
                    </option>

                    <option value="Entertainment">
                        Entertainment
                    </option>

                    <option value="Health">
                        Health
                    </option>

                    <option value="Daily Use">
                        Daily Use
                    </option>

                    <option value="Education">
                        Education
                    </option>

                    <option value="Other">
                        Other
                    </option>

                </select>

                <input
                    type="text"
                    id="description"
                    placeholder="Description (optional)"
                >

                <input
                    type="number"
                    id="amount"
                    placeholder="Amount"
                    min="1"
                >

                <button id="addExpenseBtn">
                    Add Expense
                </button>

            </div>

        </section>

        <!-- CHART -->
        <section class="panel chart-panel">

            <h2>
                Daily Spending Analysis
            </h2>

            <canvas id="expenseChart">
            </canvas>

        </section>

        <!-- TRANSACTION HISTORY -->
        <section class="panel transaction-panel">

            <h2>
                Transaction History
            </h2>

            <div class="table-container">

                <table>

                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Delete</th>
                        </tr>
                    </thead>

                    <tbody
                        id="transactionTableBody"
                    >
                    </tbody>

                </table>

            </div>

        </section>

    </div>

    <script src="script.js"></script>
    <script src="analytics.js"></script>

</body>
</html>
